services:
  app:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://growth:growth@db:5432/growth_agent
      APP_ENV: ${APP_ENV:-development}
      TESTING: ${TESTING:-false}
      SCHEDULING_DRY_RUN: ${SCHEDULING_DRY_RUN:-true}
      REQUEST_TIMEOUT_SECONDS: ${REQUEST_TIMEOUT_SECONDS:-10}
      MAX_EXTERNAL_RETRIES: ${MAX_EXTERNAL_RETRIES:-2}
      SAFE_PUBLIC_READS: ${SAFE_PUBLIC_READS:-false}
      AUTO_APPLY_TENTATIVE_RULES: ${AUTO_APPLY_TENTATIVE_RULES:-false}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: growth_agent
      POSTGRES_USER: growth
      POSTGRES_PASSWORD: growth
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U growth -d growth_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
